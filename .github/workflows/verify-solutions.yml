name: Verify Solutions
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Audit solutions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate solution manifest
        run: npx 100xsystems audit-solutions claude-code track-typescript
        continue-on-error: true

      - name: Check manifest changes
        run: |
          if ! git diff --exit-code .solution-manifest.json 2>/dev/null; then
            echo "⚠️  Solution manifest has changed. Commit the new manifest file."
            git diff .solution-manifest.json
          fi

  verify-typescript:
    name: Verify TypeScript track
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify all solutions
        run: npx 100xsystems verify-solutions claude-code track-typescript

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: /tmp/100x-verify-reports/
